name: equipment_app
description: ระบบตรวจเช็คครุภัณฑ์ - Equipment Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — อัปเกรดทุกตัว
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # State Management
  provider: ^6.1.1

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  http: ^1.2.0
  http_parser: ^4.0.2

  # QR Code
  mobile_scanner: ^3.5.7
  qr_flutter: ^4.1.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  path: ^1.9.0
  file_picker: ^8.0.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  lottie: ^3.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/